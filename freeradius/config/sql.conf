# FreeRADIUS SQL module configuration
# Connects to the radius MySQL database

sql {
    driver = "rlm_sql_mysql"
    dialect = "mysql"

    server = "radius-db"
    port = 3306
    login = "radius"
    password = "${RADIUS_MYSQL_PASSWORD}"
    radius_db = "radius"

    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    authcheck_table = "radcheck"
    groupcheck_table = "radgroupcheck"
    authreply_table = "radreply"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    nas_table = "nas"

    read_groups = yes
    read_profiles = yes

    pool {
        start = 5
        min = 4
        max = 10
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }

    read_clients = yes
    client_table = "nas"
}
