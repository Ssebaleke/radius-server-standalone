# FreeRADIUS clients.conf
# Default client — actual clients loaded from MySQL nas table

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
    shortname = localhost
}

# Allow all MikroTik routers — actual secrets verified per-NAS from MySQL
client 0.0.0.0/0 {
    secret = ${RADIUS_DEFAULT_SECRET}
    shortname = dynamic
    nastype = other
}
