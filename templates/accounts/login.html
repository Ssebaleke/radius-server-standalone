{% extends 'base.html' %}
{% block title %}Login — SpotPay RADIUS{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-4">
    <div class="text-center mb-4">
        <h4 class="fw-bold"><i class="bi bi-wifi text-primary me-2"></i>SpotPay RADIUS</h4>
        <p class="text-muted">Sign in to your RADIUS dashboard</p>
    </div>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Sign In</button>
            </form>
        </div>
    </div>
    <p class="text-center mt-3 text-muted small">
        No account? <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
</div>
{% endblock %}
