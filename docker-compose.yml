services:

  # ── FreeRADIUS MySQL Database ──────────────────────────────────────────────
  radius-db:
    image: mysql:8.0
    container_name: spotpay-radius-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${RADIUS_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: radius
      MYSQL_USER: radius
      MYSQL_PASSWORD: ${RADIUS_MYSQL_PASSWORD}
    volumes:
      - radius-db-data:/var/lib/mysql
      - ./freeradius/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - radius-net

  # ── FreeRADIUS Server ──────────────────────────────────────────────────────
  freeradius:
    image: freeradius/freeradius-server:latest
    container_name: spotpay-freeradius
    restart: always
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius/config/radiusd.conf:/etc/freeradius/radiusd.conf
      - ./freeradius/config/clients.conf:/etc/freeradius/clients.conf
      - ./freeradius/config/sql.conf:/etc/freeradius/mods-available/sql
      - ./freeradius/config/default:/etc/freeradius/sites-available/default
    depends_on:
      - radius-db
    networks:
      - radius-net

  # ── RADIUS Dashboard (Django) ──────────────────────────────────────────────
  radius-web:
    build: .
    container_name: spotpay-radius-web
    restart: always
    env_file: .env
    depends_on:
      - radius-db
    networks:
      - radius-net
      - spotpay-net

  # ── Nginx (serves radius.spotpay.it.com) ──────────────────────────────────
  radius-nginx:
    image: nginx:alpine
    container_name: spotpay-radius-nginx
    restart: always
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - radius-web
    networks:
      - radius-net
      - spotpay-net

volumes:
  radius-db-data:

networks:
  radius-net:
    driver: bridge
  spotpay-net:
    external: true
    name: spotpay-deployment_default
